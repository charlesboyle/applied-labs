<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applied Labs / Independent product design lab based in Abu Dhabi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:           #0b0a08;
      --bg-row:       rgba(255, 255, 255, 0.025);
      --ink:          #e6dfd3;
      --ink-muted:    #5a544b;
      --ink-dim:      #222019;
      --accent:       #c8c2b8;
      --accent-soft:  rgba(200, 194, 184, 0.08);
      --border:       rgba(255, 255, 255, 0.055);
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "JetBrains Mono", monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background depth ───────────────────────────────────── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 50% at 50% -5%, rgba(255,255,255,0.03) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Film grain ─────────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9000;
      opacity: 0.032;
      mix-blend-mode: screen;
    }

    /* ── Cursor ─────────────────────────────────────────────── */
    .cursor-ring {
      position: fixed;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      pointer-events: none;
      z-index: 9999;
      top: 0; left: 0;
      transform: translate(-50%, -50%);
      opacity: 0.5;
      transition:
        width  0.45s var(--ease-spring),
        height 0.45s var(--ease-spring),
        opacity 0.3s ease,
        border-color 0.3s ease;
      will-change: transform;
    }

    .cursor-dot {
      position: fixed;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      z-index: 10000;
      top: 0; left: 0;
      transform: translate(-50%, -50%);
      will-change: transform;
    }

    .cursor-ring.hovering {
      width: 64px;
      height: 64px;
      opacity: 0.18;
      border-color: var(--accent);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 32px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      padding: 88px 0 80px;
    }

    .wordmark {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.7s var(--ease-out) 0.05s forwards;
    }

    .headline {
      font-family: "Syne", sans-serif;
      font-size: clamp(42px, 7vw, 68px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.0;
      margin-bottom: 20px;
      color: var(--ink);
      opacity: 0;
      transform: translateY(18px);
      animation: rise 0.8s var(--ease-out) 0.15s forwards;
    }

    .headline em {
      font-style: normal;
      font-weight: 600;
      color: var(--ink-muted);
    }

    .subline {
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      color: var(--ink-muted);
      line-height: 1.75;
      max-width: 420px;
      font-weight: 400;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.7s var(--ease-out) 0.25s forwards;
    }

    /* ── Section label ───────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 0;
      opacity: 0;
      animation: rise 0.6s var(--ease-out) 0.4s forwards;
    }

    .section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Projects ────────────────────────────────────────────── */
    .projects {
      padding-bottom: 100px;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      margin: 0 -16px;
    }

    /* ── Project row ─────────────────────────────────────────── */
    .project-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0 24px;
      align-items: center;
      padding: 24px 16px;
      border-bottom: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      position: relative;
      cursor: none;
      opacity: 0;
      transform: translateY(16px);
      transition:
        background 0.3s ease,
        border-radius 0.3s ease;
    }

    .project-row.visible {
      animation: rise 0.55s var(--ease-out) forwards;
    }

    .project-row:hover {
      background: var(--bg-row);
      border-radius: 12px;
    }

    .row-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project-name {
      font-family: "Syne", sans-serif;
      font-size: clamp(20px, 3vw, 26px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
      transition: color 0.25s ease;
    }

    .project-row:hover .project-name {
      color: #ffffff;
    }

    .project-desc {
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-muted);
      line-height: 1.6;
      letter-spacing: 0.01em;
      transition: color 0.25s ease;
    }

    .project-row:hover .project-desc {
      color: var(--accent);
    }

    .arrow {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        border-color 0.3s ease,
        transform 0.4s var(--ease-spring),
        background 0.3s ease;
    }

    .project-row:hover .arrow {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translate(2px, -2px) rotate(-3deg);
    }

    .arrow svg {
      width: 13px;
      height: 13px;
      stroke: var(--ink-muted);
      stroke-width: 1.5;
      fill: none;
      transition: stroke 0.3s ease;
    }

    .project-row:hover .arrow svg {
      stroke: var(--accent);
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      opacity: 0;
      animation: rise 0.6s var(--ease-out) 0.9s forwards;
    }

    .footer-left {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-muted);
      letter-spacing: 0.14em;
    }

    .footer-email {
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s ease;
    }

    .footer-email:hover {
      color: var(--ink);
    }

    /* ── Animations ──────────────────────────────────────────── */
    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .container { padding: 0 20px; }

      header { padding: 60px 0 56px; }

      .project-list { margin: 0 -8px; }

      .project-row { padding: 20px 12px; }

      .arrow { display: none; }

      .cursor-ring,
      .cursor-dot { display: none; }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

  <!-- Film grain -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)"/>
  </svg>

  <!-- Custom cursor -->
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <div class="container">
    <header>
      <div class="wordmark">Applied Labs</div>
      <h1 class="headline">Less talk.<br><em>More ship.</em></h1>
    </header>

    <main class="projects">
      <div class="project-list" id="projectList">

        <a class="project-row" href="/siginspector" target="_blank" rel="noopener" data-delay="0">
          <div class="row-body">
            <span class="project-name">SigInspector</span>
            <p class="project-desc">Chrome extension to monitor Statsig SDK events in real time</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
        </a>

        <a class="project-row" href="https://framed-six.vercel.app/" target="_blank" rel="noopener" data-delay="1">
          <div class="row-body">
            <span class="project-name">Framed</span>
            <p class="project-desc">Turn screen recordings into frames for Figma</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
        </a>

        <a class="project-row" href="https://snoograph.com" target="_blank" rel="noopener" data-delay="2">
          <div class="row-body">
            <span class="project-name">Snoograph</span>
            <p class="project-desc">Reddit sentiment heatmaps</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
        </a>

        <a class="project-row" href="https://happening.ae" target="_blank" rel="noopener" data-delay="3">
          <div class="row-body">
            <span class="project-name">Happening</span>
            <p class="project-desc">Make your week Happening across the UAE</p>
          </div>
          <div class="arrow">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
        </a>

      </div>
    </main>

    <footer>
      <span class="footer-left">ALWAYS BUILDING</span>
      <a href="mailto:hello@applied.llc" class="footer-email">hello@applied.llc</a>
    </footer>
  </div>

  <script>
    // ── Staggered row entrance ────────────────────────────────
    const rows = document.querySelectorAll('.project-row');
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const d = parseInt(entry.target.dataset.delay || 0, 10);
          entry.target.style.animationDelay = `${0.45 + d * 0.09}s`;
          entry.target.classList.add('visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08 });
    rows.forEach(r => io.observe(r));

    // ── Dual cursor (ring lags, dot follows exactly) ──────────
    const ring = document.getElementById('cursorRing');
    const dot  = document.getElementById('cursorDot');

    // Hide native cursor across the page
    document.documentElement.style.cursor = 'none';

    let mx = -100, my = -100;
    let rx = -100, ry = -100;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
      dot.style.left = mx + 'px';
      dot.style.top  = my + 'px';
    });

    (function lerpRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(lerpRing);
    })();

    rows.forEach(row => {
      row.addEventListener('mouseenter', () => ring.classList.add('hovering'));
      row.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
    });

    document.addEventListener('mouseleave', () => {
      ring.style.opacity = '0';
      dot.style.opacity  = '0';
    });
    document.addEventListener('mouseenter', () => {
      ring.style.opacity = '';
      dot.style.opacity  = '';
    });
  </script>

</body>
</html>
